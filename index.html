<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boligsøk — Property Tracker</title>
<script src="config.js"></script>
<!--
  ============================================================
  SUPABASE SETUP INSTRUCTIONS
  ============================================================

  1. Create a free Supabase project at https://supabase.com

  2. In the SQL Editor, run this to create the properties table:

     create table properties (
       id text primary key,
       data jsonb not null default '{}',
       updated_at timestamptz default now()
     );

     alter table properties enable row level security;

     create policy "Public read"  on properties for select using (true);
     create policy "Public insert" on properties for insert with check (true);
     create policy "Public update" on properties for update using (true);
     create policy "Public delete" on properties for delete using (true);

  3. Create a Storage bucket for images:
     - Go to Storage in your Supabase dashboard
     - Click "New bucket"
     - Name it: property-images
     - Toggle ON "Public bucket"
     - Under Policies, add a policy for ALL operations with "true" expression

     Or run this SQL:

     insert into storage.buckets (id, name, public)
     values ('property-images', 'property-images', true);

     create policy "Anyone can upload" on storage.objects
       for insert with check (bucket_id = 'property-images');
     create policy "Anyone can read" on storage.objects
       for select using (bucket_id = 'property-images');
     create policy "Anyone can delete" on storage.objects
       for delete using (bucket_id = 'property-images');

  4. Copy your Project URL and anon (public) key from:
     Settings → API → Project URL / Project API keys (anon public)

  5. Paste them into the SUPABASE_URL and SUPABASE_ANON_KEY below.

  6. Deploy this file to GitHub Pages or open locally.
     Both you and your husband will share the same data.
  ============================================================
-->
<!-- Config: edit config.js to set your Supabase URL and anon key -->
<script src="config.js"></script>
<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f4f1;--card:#ffffff;--border:#e6e2dc;--border-lt:#edeae5;
  --text:#2c2926;--text2:#78716a;--text3:#a8a29e;
  --accent:#5c8c72;--accent-light:#e6f0ea;--accent-hover:#4a7a60;--accent-bg:#f0f7f3;
  --red:#b34a3f;--red-lt:#fceeed;--orange:#c07a20;--orange-lt:#fef6e8;
  --blue:#4e7fa3;--blue-lt:#ebf2f8;--green:#4e8c5e;--green-lt:#eaf5ed;
  --purple:#7a5e9e;--purple-lt:#f2eef8;--grey:#8a857e;--grey-lt:#f0ede9;
  --warm:#faf8f5;
  --r:8px;--r-lg:12px;
  --sh:0 1px 3px rgba(0,0,0,.04);--sh-md:0 3px 10px rgba(0,0,0,.05);--sh-lg:0 10px 35px rgba(0,0,0,.08);
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
  --panel:420px;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.topnav{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 1.5rem;height:50px;gap:.8rem}
.logo{font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:-.02em;white-space:nowrap}
.nav-tabs{display:flex;margin-left:.5rem}
.nav-tab{padding:0 .9rem;font:inherit;font-size:.8rem;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--text3);height:50px;display:flex;align-items:center;transition:all .12s}
.nav-tab:hover{color:var(--text2)}.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-right{margin-left:auto;display:flex;gap:.35rem;align-items:center}
.page{display:none}.page.active{display:block}
/* Sync indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}.sync-dot.loading{background:var(--orange);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:.68rem;color:var(--text3);display:flex;align-items:center;gap:.15rem;margin-right:.4rem;cursor:pointer;border:none;background:none;font-family:inherit}
.sync-label:hover{color:var(--text2)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.38rem .75rem;border:1px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--text2);font:inherit;font-size:.78rem;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--text3);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-sm{padding:.28rem .55rem;font-size:.73rem}
.btn-icon{width:26px;height:26px;padding:0;border:none;background:none;cursor:pointer;color:var(--text3);border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .1s}
.btn-icon:hover{color:var(--text);background:var(--grey-lt)}
.btn-link{background:none;border:none;color:var(--accent);cursor:pointer;font:inherit;font-size:.78rem;font-weight:600;padding:.2rem 0;text-decoration:none;display:inline-flex;align-items:center;gap:.25rem}
.btn-link:hover{color:var(--accent-hover);text-decoration:underline}
/* Layout */
.main-layout{display:grid;grid-template-columns:1fr var(--panel);min-height:calc(100vh - 50px)}
.main-left{padding:1.1rem 1.3rem;overflow-y:auto}
.main-right{background:var(--card);border-left:1px solid var(--border);overflow-y:auto;position:sticky;top:50px;height:calc(100vh - 50px)}
.main-right-inner{padding:1.2rem}
/* Dashboard */
.dash{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
.dash-card{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--r);padding:.55rem .75rem;box-shadow:var(--sh);min-width:100px;flex:1}
.dash-card .dl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.dash-card .dv{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;margin-top:.05rem}
.dash-card .dv.sm{font-size:.82rem}
/* Filters */
.toolbar{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.5rem;align-items:center}
.search-box{flex:1;min-width:150px;padding:.38rem .65rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.82rem;background:var(--card)}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.fsel{padding:.38rem .45rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.75rem;background:var(--card);color:var(--text2);cursor:pointer}
.fsel:focus{outline:none;border-color:var(--accent)}
/* Compare */
.compare-bar{background:var(--accent);color:#fff;padding:.4rem 1rem;display:none;align-items:center;justify-content:space-between;border-radius:var(--r);margin-bottom:.6rem;font-size:.8rem}
.compare-bar.active{display:flex}
.compare-bar .btn{color:#fff;border-color:rgba(255,255,255,.3);font-size:.73rem}
/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead{background:var(--warm)}
th{padding:.5rem .55rem;text-align:left;font-weight:600;font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text2)}
th .sa{margin-left:.15rem;font-size:.58rem;opacity:.35}
th.sorted .sa{opacity:1;color:var(--accent)}
td{padding:.4rem .55rem;border-bottom:1px solid var(--border-lt);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .08s}
tbody tr:hover td{background:var(--warm)}
tr.row-sel td{background:var(--accent-light) !important}
.tt{width:64px;height:48px;border-radius:6px;object-fit:cover;display:block}
.tt-empty{width:64px;height:48px;border-radius:6px;background:var(--grey-lt);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.1rem}
.c-main{line-height:1.35}
.c-addr{font-weight:600;color:var(--text);display:block;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-real{font-size:.72rem;color:var(--text2);display:block;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-notes{font-size:.7rem;color:var(--text3);display:block;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;margin-top:.1rem}
.c-price{font-weight:700;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.c-num{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;color:var(--text2);font-size:.78rem}
.c-mort{font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.c-act{white-space:nowrap;display:flex;gap:.1rem}
/* Badges */
.badge{display:inline-block;padding:.1rem .45rem;border-radius:99px;font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.02em}
.badge-new{background:var(--blue-lt);color:var(--blue)}.badge-interested{background:var(--green-lt);color:var(--green)}.badge-viewed{background:var(--purple-lt);color:var(--purple)}.badge-bid-planned{background:var(--orange-lt);color:var(--orange)}.badge-bid-submitted{background:#fde8d0;color:#b06015}.badge-rejected{background:var(--red-lt);color:var(--red)}.badge-sold{background:var(--grey-lt);color:var(--grey)}.badge-not-relevant{background:var(--grey-lt);color:var(--text3)}.badge-above{background:var(--green-lt);color:var(--green)}.badge-at{background:var(--grey-lt);color:var(--grey)}.badge-below{background:var(--orange-lt);color:var(--orange)}
.sdif{font-size:.73rem;font-weight:600;white-space:nowrap}.sdif.above{color:var(--green)}.sdif.below{color:var(--red)}.sdif.at{color:var(--grey)}
/* Report risk badges */
.risk{display:inline-block;padding:.1rem .42rem;border-radius:99px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.risk-green{background:#e2f3e8;color:#2d7a42}.risk-yellow{background:#fef6d8;color:#a07b15}.risk-yellow-red{background:#fde8c8;color:#b05e12}.risk-red{background:var(--red-lt);color:var(--red)}
/* BISS travel line in table */
.c-biss{font-size:.66rem;color:var(--blue);display:block;margin-top:.05rem}
.c-report{font-size:.66rem;color:var(--text3);display:block;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Report section in right panel */
.rp-report{background:var(--warm);border-radius:var(--r);padding:.7rem;margin-bottom:.5rem}
.rp-report-row{display:flex;justify-content:space-between;padding:.15rem 0;font-size:.78rem}
.rp-report-row .rrl{color:var(--text3);font-size:.72rem}.rp-report-row .rrv{color:var(--text);font-weight:500}
.rp-report-text{font-size:.78rem;color:var(--text);line-height:1.45;white-space:pre-wrap;margin-top:.3rem}
.star-btn{background:none;border:none;cursor:pointer;font-size:.9rem;color:var(--border);padding:0;line-height:1}.star-btn.active{color:#d9a832}.star-btn:hover{color:#d9a832}
.cbx{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
/* Right panel */
.rp-photo{width:100%;aspect-ratio:16/10;border-radius:var(--r-lg);object-fit:cover;display:block;background:var(--grey-lt);margin-bottom:.8rem}
.rp-photo-empty{width:100%;aspect-ratio:16/10;border-radius:var(--r-lg);background:var(--grey-lt);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:2rem;margin-bottom:.8rem}
.rp-thumbs{display:flex;gap:.3rem;margin-bottom:.8rem;flex-wrap:wrap}
.rp-thumb{width:52px;height:38px;border-radius:5px;object-fit:cover;cursor:pointer;border:2px solid transparent;opacity:.7;transition:all .1s}
.rp-thumb:hover,.rp-thumb.active{opacity:1;border-color:var(--accent)}
.rp-addr{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:.1rem}
.rp-sub{font-size:.78rem;color:var(--text2);line-height:1.35;margin-bottom:.15rem}
.rp-sub span{margin-right:.6rem}
.rp-finn{margin:.4rem 0 .6rem}
.rp-sec{margin-top:.8rem;margin-bottom:.3rem;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-weight:600;padding-bottom:.2rem;border-bottom:1px solid var(--border-lt)}
.rp-notes{font-size:.82rem;color:var(--text);line-height:1.5;white-space:pre-wrap;background:var(--warm);border-radius:var(--r);padding:.6rem .7rem;margin-bottom:.5rem}
.rp-notes.empty{color:var(--text3);font-style:italic;background:none;padding:0}
.rp-procon{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem}
.rp-procon div{font-size:.78rem;line-height:1.4}
.rp-procon .rp-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:600;margin-bottom:.15rem}
.rp-procon .pro{color:var(--green)}.rp-procon .con{color:var(--red)}
.rp-hero{background:var(--accent-bg);border:1px solid var(--accent-light);border-radius:var(--r-lg);padding:.9rem;text-align:center;margin:.6rem 0}
.rp-hero .rp-h-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:600}
.rp-hero .rp-h-val{font-size:1.9rem;font-weight:800;color:var(--accent);letter-spacing:-.03em;line-height:1.1}
.rp-hero .rp-h-sub{font-size:.72rem;color:var(--text2);margin-top:.15rem}
.rp-mrow{display:flex;justify-content:space-between;padding:.2rem 0;font-size:.77rem}
.rp-mrow .ml{color:var(--text2)}.rp-mrow .mv{font-weight:600;font-variant-numeric:tabular-nums}
.rp-presets{display:flex;gap:.2rem;flex-wrap:wrap}
.rp-preset{padding:.18rem .45rem;font-size:.67rem;border:1px solid var(--border);border-radius:var(--r);background:var(--card);cursor:pointer;font-family:inherit;color:var(--text2)}
.rp-preset:hover,.rp-preset.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.rp-inp{display:inline-flex;align-items:center;gap:.2rem;font-size:.72rem;color:var(--text2)}
.rp-inp input{width:50px;padding:.2rem .3rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.75rem;text-align:right}
.rp-inp input:focus{outline:none;border-color:var(--accent)}
.rp-divider{border:none;border-top:1px solid var(--border-lt);margin:.4rem 0}
.rp-actions{display:flex;gap:.35rem;margin-top:.6rem;flex-wrap:wrap}
/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;justify-content:center;align-items:flex-start;padding:1.5rem;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--r-lg);width:100%;max-width:600px;box-shadow:var(--sh-lg);margin-top:3vh;animation:mup .18s ease}
@keyframes mup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mh{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.2rem;border-bottom:1px solid var(--border-lt)}
.mh h2{font-size:.95rem;font-weight:700}
.mbody{padding:1.2rem;max-height:72vh;overflow-y:auto}
.mfoot{padding:.7rem 1.2rem;border-top:1px solid var(--border-lt);display:flex;justify-content:flex-end;gap:.35rem}
/* Form */
.sf{display:grid;grid-template-columns:1fr 1fr;gap:.6rem .9rem}
.sf .full{grid-column:1/-1}
.sf label{display:block;font-size:.68rem;font-weight:600;color:var(--text3);margin-bottom:.12rem;text-transform:uppercase;letter-spacing:.04em}
.sf input,.sf select,.sf textarea{width:100%;padding:.4rem .55rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.82rem;background:var(--card);color:var(--text)}
.sf textarea{resize:vertical;min-height:60px}
.sf input:focus,.sf select:focus,.sf textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.sf-sec{grid-column:1/-1;font-size:.72rem;font-weight:700;color:var(--accent);margin-top:.3rem;padding-bottom:.15rem;border-bottom:1px solid var(--border-lt)}
.img-up{grid-column:1/-1;background:var(--warm);border:2px dashed var(--border);border-radius:var(--r-lg);padding:.8rem;text-align:center;cursor:pointer;transition:all .12s}
.img-up:hover,.img-up.dragover{border-color:var(--accent);background:var(--accent-light)}
.img-up .dt{font-size:.78rem;color:var(--text3)}.img-up .dt strong{color:var(--accent)}
.img-warn{grid-column:1/-1;font-size:.65rem;color:var(--text3)}
.img-thumbs{grid-column:1/-1;display:flex;flex-wrap:wrap;gap:.35rem}
.img-th{position:relative;width:68px;height:50px;border-radius:5px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.img-th img{width:100%;height:100%;object-fit:cover}
.img-th.cover{border-color:var(--accent)}
.img-th .img-del{position:absolute;top:1px;right:1px;width:16px;height:16px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-th .img-ctag{position:absolute;bottom:0;left:0;right:0;background:var(--accent);color:#fff;font-size:.52rem;text-align:center;text-transform:uppercase;font-weight:700}
.impbox{grid-column:1/-1;background:var(--warm);border:1px dashed var(--border);border-radius:var(--r);padding:.7rem}
.impbox summary{font-size:.75rem;font-weight:600;color:var(--accent);cursor:pointer}
.impbox .hint{font-size:.68rem;color:var(--text3);margin:.4rem 0 .2rem;line-height:1.3}
.impbox textarea{width:100%;min-height:60px;padding:.35rem .5rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.78rem;resize:vertical;background:var(--card)}
.impbox .iacts{display:flex;gap:.3rem;margin-top:.3rem;align-items:center}
.ist{font-size:.7rem;margin-left:.2rem}.ist.ok{color:var(--green)}.ist.er{color:var(--red)}
.ctable{width:100%;border-collapse:collapse;font-size:.78rem}
.ctable th{background:var(--warm);text-align:left;padding:.4rem .5rem;font-size:.64rem;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
.ctable td{padding:.4rem .5rem;border-bottom:1px solid var(--border-lt);vertical-align:top}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;justify-content:center;align-items:center;cursor:pointer}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:var(--r-lg)}
/* Full mortgage page */
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.mc-card{background:var(--card);border:1px solid var(--border-lt);border-radius:var(--r-lg);padding:1rem;box-shadow:var(--sh)}
.mc-card h3{font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.03em}
.mc-rf{margin-bottom:.45rem}
.mc-rf label{display:block;font-size:.66rem;font-weight:600;color:var(--text3);margin-bottom:.1rem;text-transform:uppercase;letter-spacing:.04em}
.mc-rf input{width:100%;padding:.38rem .55rem;border:1px solid var(--border);border-radius:var(--r);font:inherit;font-size:.82rem}
.mc-rf input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.mc-presets{display:flex;gap:.25rem;margin-top:.2rem;flex-wrap:wrap}
.mc-presets button{padding:.16rem .45rem;font-size:.68rem;border:1px solid var(--border);border-radius:var(--r);background:var(--card);cursor:pointer;font-family:inherit;color:var(--text2)}
.mc-presets button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.mc-res{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid var(--border-lt);font-size:.78rem}
.mc-res:last-child{border-bottom:none}
.mc-res .mc-rl{color:var(--text2)}.mc-res .mc-rv{font-weight:600;font-variant-numeric:tabular-nums}
.mc-res .mc-rv.green{color:var(--green)}.mc-res .mc-rv.red{color:var(--red)}
.mc-ct{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:.3rem}
.mc-ct th{background:var(--warm);padding:.35rem .45rem;font-size:.64rem;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);text-align:right}
.mc-ct th:first-child{text-align:left}
.mc-ct td{padding:.35rem .45rem;border-bottom:1px solid var(--border-lt);text-align:right;font-variant-numeric:tabular-nums}
.mc-ct td:first-child{text-align:left;font-weight:500}
.mc-ct tr.hl td{background:var(--accent-light);font-weight:600}
/* School Run */
.sr-table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:.4rem}
.sr-table th{background:var(--warm);padding:.35rem .45rem;font-size:.62rem;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);text-align:left;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap}
.sr-table th:hover{color:var(--text2)}
.sr-table th .sa{margin-left:.1rem;font-size:.55rem;opacity:.35}
.sr-table th.sorted .sa{opacity:1;color:var(--accent)}

<script>
/* ============================================================
   SUPABASE CONFIG — loaded from config.js
   ============================================================ */
var _cfg = window.APP_CONFIG || {};
var SUPABASE_URL  = _cfg.SUPABASE_URL || '';
var SUPABASE_ANON_KEY = _cfg.SUPABASE_ANON_KEY || '';
var STORAGE_BUCKET = 'property-images';

// Show warning if config is missing
(function(){
  if (!window.APP_CONFIG) {
    document.getElementById('configWarn').innerHTML = '<div class="config-warn">⚠ config.js not found. Create a config.js file next to index.html — see setup instructions in the HTML comment.</div>';
  } else if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.getElementById('configWarn').innerHTML = '<div class="config-warn">⚠ Supabase not configured. Open <a href="config.js">config.js</a> and paste your SUPABASE_URL and SUPABASE_ANON_KEY. Data is saved locally only until configured.</div>';
  }
})();

/* ============================================================
   SUPABASE CLIENT INIT
   ============================================================ */
var sb = null;  // supabase client
var sbOk = false; // connection status
function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    console.warn('Supabase not configured — using localStorage fallback.');
    setSyncStatus('err', 'No config');
    return;
  }
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    sbOk = true;
    setSyncStatus('ok', 'Connected');
  } catch (e) {
    console.error('Supabase init failed:', e);
    setSyncStatus('err', 'Init failed');
  }
}

/* ============================================================
   SYNC STATUS UI
   ============================================================ */
function setSyncStatus(state, text) {
  var dot = document.getElementById('syncDot');
  var lbl = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = text;
}
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function () { el.classList.remove('show'); }, 2200);
}

/* ============================================================
   DATA LOAD — Supabase primary, localStorage fallback
   ============================================================ */
var STATUSES = ['New','Interested','Viewed','Bid planned','Bid submitted','Rejected','Sold to others','Not relevant'];
var ALL_KEYS = ['id','favorite','finnLink','address','municipality','realtor','realtorAgency','propertyType','status','priority','askingPrice','estimatedFinal','felleskostnader','estimatedReno','soldPrice','soldDate','areaSqm','pricePerSqm','plotSize','bedrooms','bathrooms','yearBuilt','dateAdded','viewingDate','conditionNotes','viewingNotes','realtorNotes','pros','cons','tg2','tg3','images','travelTimeToBISS','travelModeToBISS','reportRiskLevel','reportSummary','reportEstimatedCosts','reportKeyFindings','schoolRuns','listType','sortOrder'];
var FORM_FIELDS = [
  {k:'finnLink',l:'Finn Link',t:'url',full:1},
  {k:'address',l:'Address',t:'text'},{k:'listType',l:'List Type',t:'listtype'},
  {k:'realtor',l:'Realtor',t:'text'},
  {k:'realtorAgency',l:'Realtor Agency',t:'text'},
  {k:'askingPrice',l:'Asking Price (NOK)',t:'number'},{k:'soldPrice',l:'Sold Price (NOK)',t:'number'},
  {k:'status',l:'Status',t:'status'},{k:'dateAdded',l:'Date Added',t:'date'},
  {k:'realtorNotes',l:'Notes on Realtor Conversation',t:'textarea',full:1,sec:'notes'},
  {k:'pros',l:'Our Pros',t:'textarea',full:1},{k:'cons',l:'Our Cons',t:'textarea',full:1},
  {k:'travelTimeToBISS',l:'Travel Time to BISS (min)',t:'number',sec:'biss'},
  {k:'travelModeToBISS',l:'Travel Mode to BISS',t:'travelmode'},
  {k:'reportRiskLevel',l:'Report Risk Level',t:'risklevel',sec:'report'},
  {k:'reportSummary',l:'Report Summary',t:'textarea',full:1},
  {k:'reportEstimatedCosts',l:'Report Estimated Costs',t:'text',full:1},
  {k:'reportKeyFindings',l:'Report Key Findings',t:'textarea',full:1}
];
var COLS = [
  {k:'_fav',l:'★',w:'26px'},{k:'_cb',l:'',w:'26px'},{k:'_img',l:'',w:'72px'},
  {k:'address',l:'Property',sort:1},{k:'askingPrice',l:'Asking',sort:1},
  {k:'soldPrice',l:'Sold',sort:1},{k:'_diff',l:'Diff',sort:1},
  {k:'_mort',l:'Monthly',sort:1},{k:'status',l:'Status',sort:1},
  {k:'_act',l:'',w:'56px'},{k:'_order',l:'',w:'36px'}
];

var props = [], editId = null, sortCol = '_manual', sortDir = 'asc';
var cmpSet = new Set(), selId = null, tempImgs = [];
var mpDP = 10, mpRate = 7, mpTerm = 30;

/* Load from Supabase, fallback to localStorage */
async function loadFromSupabase() {
  if (!sb) { loadLocal(); renderTable(); return; }
  setSyncStatus('loading', 'Syncing…');
  try {
    var { data, error } = await sb.from('properties').select('*').order('updated_at', { ascending: false });
    if (error) throw error;
    props = data.map(function (row) {
      var p = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
      p.id = row.id;
      return p;
    });
    // Cache to localStorage as fallback
    try { localStorage.setItem('boligsok_props', JSON.stringify(props)); } catch (e) {}
    setSyncStatus('ok', 'Synced');
    toast('Loaded ' + props.length + ' properties');
  } catch (e) {
    console.error('Supabase load failed:', e);
    setSyncStatus('err', 'Offline');
    loadLocal();
    toast('Offline — using local cache');
  }
  renderTable();
}

function loadLocal() {
  try { props = JSON.parse(localStorage.getItem('boligsok_props') || '[]'); } catch (e) { props = []; }
  if (!props.length) seedDemo();
}

/* Save single property to Supabase */
async function saveToSupabase(p) {
  if (!sb) { saveLocal(); return; }
  setSyncStatus('loading', 'Saving…');
  try {
    var row = { id: p.id, data: p, updated_at: new Date().toISOString() };
    var { error } = await sb.from('properties').upsert(row, { onConflict: 'id' });
    if (error) throw error;
    setSyncStatus('ok', 'Saved');
  } catch (e) {
    console.error('Supabase save failed:', e);
    setSyncStatus('err', 'Save failed');
    toast('Save failed — changes cached locally');
  }
  saveLocal(); // always keep local cache
}

/* Delete from Supabase */
async function deleteFromSupabase(id) {
  if (!sb) return;
  try {
    await sb.from('properties').delete().eq('id', id);
    // Also delete any images in storage for this property
    try {
      var { data } = await sb.storage.from(STORAGE_BUCKET).list(id + '/');
      if (data && data.length) {
        var paths = data.map(function (f) { return id + '/' + f.name; });
        await sb.storage.from(STORAGE_BUCKET).remove(paths);
      }
    } catch (e) {}
  } catch (e) { console.error('Supabase delete failed:', e); }
}

/* ============================================================
   IMAGE UPLOAD TO SUPABASE STORAGE
   ============================================================ */
async function uploadImage(propId, file) {
  // Compress first
  return new Promise(function (resolve) {
    compressImg(file, 800, 0.7, async function (dataUrl) {
      if (!sb) {
        // No Supabase — store as data URL (localStorage fallback)
        resolve({ id: gid(), name: file.name, data: dataUrl, cover: false });
        return;
      }
      try {
        // Convert data URL to blob for upload
        var resp = await fetch(dataUrl);
        var blob = await resp.blob();
        var path = propId + '/' + gid() + '.jpg';
        var { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, blob, { contentType: 'image/jpeg', upsert: true });
        if (error) throw error;
        var { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        resolve({ id: gid(), name: file.name, data: urlData.publicUrl, path: path, cover: false });
      } catch (e) {
        console.error('Image upload failed:', e);
        toast('Image upload failed — stored locally');
        resolve({ id: gid(), name: file.name, data: dataUrl, cover: false });
      }
    });
  });
}

async function deleteStorageImage(img) {
  if (!sb || !img.path) return;
  try { await sb.storage.from(STORAGE_BUCKET).remove([img.path]); } catch (e) {}
}

/* ============================================================

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(n){if(n==null||n==='')return'—';return Number(n).toLocaleString('nb-NO')}
function fp(n){if(n==null||n==='')return'—';var v=Number(n);if(!v)return'—';if(v>=1e6)return(v/1e6).toFixed(2).replace('.',',')+' M';return v.toLocaleString('nb-NO')}
function fk(n){if(!n)return'—';var v=Number(n);if(!v)return'—';return(v>0?'+':'')+Math.round(v/1000).toLocaleString('nb-NO')+'k'}
function mortCalc(price,dpPct,rate,term){var down=Math.round(price*(dpPct/100)),loan=price-down;if(loan<=0)return{down:0,loan:0,monthly:0};var mr=rate/100/12,n=term*12,m=0;if(mr>0&&n>0)m=loan*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);else if(n>0)m=loan/n;return{down:down,loan:loan,monthly:Math.round(m)}}
function sdiff(p){var a=Number(p.askingPrice),s=Number(p.soldPrice);if(!a||!s)return null;return{d:s-a,pct:((s-a)/a)*100}}
function sdlbl(p){var d=sdiff(p);if(!d)return'';var cls=d.d>0?'above':d.d<0?'below':'at';return'<span class="sdif '+cls+'">'+fk(d.d)+'</span>'}
function scat(p){var d=sdiff(p);if(!d)return null;return d.d>0?'above':d.d<0?'below':'at'}
function bclass(s){var m={'New':'new','Interested':'interested','Viewed':'viewed','Bid planned':'bid-planned','Bid submitted':'bid-submitted','Rejected':'rejected','Sold to others':'sold','Not relevant':'not-relevant'};return'badge badge-'+(m[s]||'new')}
function compressImg(file,maxW,q,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w>maxW){h=Math.round(h*(maxW/w));w=maxW}var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q))};img.src=e.target.result};r.readAsDataURL(file)}

function calcFull(){var price=numF('mcPrice'),down=numF('mcDown'),rate=numF('mcRate')/100,term=numF('mcTerm');var felles=numF('mcFelles'),elec=numF('mcElec'),ins=numF('mcIns'),maint=numF('mcMaint');var rent=numF('mcRent'),coRent=numF('mcCoRent'),div=numF('mcDiv');var loan=Math.max(price-down,0),dpPct=price>0?((down/price)*100):0;var mr=rate/12,n=term*12,monthly=0;if(mr>0&&n>0)monthly=loan*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);else if(n>0)monthly=loan/n;var totalInt=0;if(mr>0&&n>0){var bal=loan;for(var i=0;i<n;i++){var mi=bal*mr;totalInt+=mi;bal-=(monthly-mi>0?monthly-mi:0)}}var costs=monthly+felles+elec+ins+maint,offsets=rent+coRent+div,net=costs-offsets;document.getElementById('mcResults').innerHTML=mcr('Loan',fp(loan))+mcr('Down',dpPct.toFixed(1)+'%')+mcr('Monthly Mortgage',fp(Math.round(monthly)))+mcr('Total Monthly',fp(Math.round(costs)))+mcr('Offsets',fp(Math.round(offsets)),'green')+mcr('Net Monthly',fp(Math.round(net)),net>0?'red':'green')+mcr('Total Interest ('+term+'yr)',fp(Math.round(totalInt)));var comp=document.getElementById('mcComp'),steps=[-1e6,-5e5,0,5e5,1e6];comp.innerHTML='<thead><tr><th style="text-align:left">Price</th><th>Down</th><th>Loan</th><th>Monthly</th><th>Net</th></tr></thead><tbody>'+steps.map(function(s){var cp=price+s;if(cp<=0)return'';var cd=Math.round(cp*(dpPct/100)),cl=cp-cd,cm=0;if(mr>0&&n>0)cm=cl*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);else if(n>0)cm=cl/n;var cn=cm+felles+elec+ins+maint-offsets;return'<tr class="'+(s===0?'hl':'')+'"><td>'+fp(cp)+'</td><td>'+fp(cd)+'</td><td>'+fp(cl)+'</td><td>'+fp(Math.round(cm))+'</td><td>'+fp(Math.round(cn))+'</td></tr>'}).join('')+'</tbody>';renderPriceLadder()}

  if (!entry.time && !entry.duration) { alert('Please enter at least a time or duration.'); return; }
  // Auto-generate maps URL if empty
  if (!entry.mapsUrl) entry.mapsUrl = genMapsUrl(p.address, entry.direction);
  if (srEditIdx >= 0 && srEditIdx < p.schoolRuns.length) {
    p.schoolRuns[srEditIdx] = entry;
  } else {
    p.schoolRuns.push(entry);
  }
  await saveToSupabase(p);
  saveLocal();
  closeSRForm();
  renderPanel();
}

async function deleteSR(propId, idx) {
  if (!confirm('Delete this school run entry?')) return;
  var p = props.find(function(x) { return x.id === propId; });
  if (!p || !p.schoolRuns) return;
  p.schoolRuns.splice(idx, 1);
  await saveToSupabase(p);
  saveLocal();
  renderPanel();
}

/* ============================================================
   SCHOOL RUN SCORING
   ============================================================ */
function parseDuration(dur) {
  if (!dur) return null;
  var s = dur.replace(/\s*min\s*/gi, '').trim();
  // Range: "7–9", "18-22", "7 – 9"
  var rangeMatch = s.match(/^(\d+)\s*[–\-]\s*(\d+)$/);
  if (rangeMatch) return (parseFloat(rangeMatch[1]) + parseFloat(rangeMatch[2])) / 2;
  // Single number: "12", "7"
  var singleMatch = s.match(/^(\d+(?:\.\d+)?)$/);
  if (singleMatch) return parseFloat(singleMatch[1]);
  return null;
}

function calcSRPriority(sr) {
  var d = sr.day || '', dir = sr.direction || '', t = sr.time || '';
  var isMon = d === 'Monday';
  var isMorning = t && parseInt(t) < 12;
  var isAfternoon = t && parseInt(t) >= 12;
  var isWeekend = d === 'Weekend';
  if (isWeekend) return 'Low';
  if (isMon && ((isMorning && t.indexOf('07:30') >= 0) || (isAfternoon && t.indexOf('16:30') >= 0))) return 'High';
  if (isMon) return 'High';
  return 'Medium';
}

function rateMinutes(mins) {
  if (mins === null) return null;
  if (mins <= 10) return 'Excellent';
  if (mins <= 15) return 'Good';
  if (mins <= 20) return 'Acceptable';
  return 'Poor';
}

function getSRRating(p) {
  var runs = p.schoolRuns || [];
  if (!runs.length) return '';
  var parsed = runs.map(function(sr) { return parseDuration(sr.duration); }).filter(function(v) { return v !== null; });
  if (!parsed.length) return '';
  // Weighted average: give more weight to high-priority runs
  var totalWeight = 0, weightedSum = 0;
  runs.forEach(function(sr) {
    var m = parseDuration(sr.duration);
    if (m === null) return;
    var pri = calcSRPriority(sr);
    var w = pri === 'High' ? 3 : pri === 'Medium' ? 2 : 1;
    weightedSum += m * w;
    totalWeight += w;
  });
  if (!totalWeight) return '';
  var avg = weightedSum / totalWeight;
  // Penalty for any run > 30 min
  var hasOver30 = parsed.some(function(v) { return v > 30; });
  if (hasOver30) return 'Poor';
  return rateMinutes(avg);
}

function getSRStats(p) {
  var runs = p.schoolRuns || [];
  if (!runs.length) return null;
  var mornings = [], afternoons = [], all = [];
  runs.forEach(function(sr) {
    var m = parseDuration(sr.duration);
    if (m === null) return;
    all.push(m);
    var t = sr.time || '';
    if (t && parseInt(t) < 12) mornings.push(m);
    else if (t) afternoons.push(m);
  });
  if (!all.length) return null;
  var bestMorning = mornings.length ? Math.round(Math.min.apply(null, mornings)) : null;
  var bestAfternoon = afternoons.length ? Math.round(Math.min.apply(null, afternoons)) : null;
  var worst = Math.round(Math.max.apply(null, all));
  var avg = Math.round(all.reduce(function(a, b) { return a + b; }, 0) / all.length);
  var rating = getSRRating(p);
  return { bestMorning: bestMorning, bestAfternoon: bestAfternoon, worst: worst, avg: avg, rating: rating };
}

/* Duration color coding: 0-10=green, 11-15=yellow, 16-20=orange, >20=red */
function durColorClass(dur) {
  var mins = parseDuration(dur);
  if (mins === null) return '';
  if (mins <= 10) return 'green';
  if (mins <= 15) return 'yellow';
  if (mins <= 20) return 'orange';
  return 'red';
}

function durBadgeHtml(dur) {
  var cls = durColorClass(dur);
  if (!cls) return '<span style="color:var(--text2)">' + esc(dur) + '</span>';
  return '<span class="dur-badge dur-' + cls + '">' + esc(dur) + '</span>';
}

function getSRDotColor(p) {
  var runs = p.schoolRuns || [];
  if (!runs.length) return '';
  var mins = runs.map(function(sr) { return parseDuration(sr.duration); }).filter(function(v) { return v !== null; });
  if (!mins.length) return '';
  var avg = mins.reduce(function(a, b) { return a + b; }, 0) / mins.length;
  if (avg <= 10) return 'green';
  if (avg <= 15) return 'yellow';
  if (avg <= 20) return 'orange';
  return 'red';
}

/* Best school run selector — picks most relevant entry for badge display */
function getBestSR(p) {
  var runs = p.schoolRuns;
  if (!runs || !runs.length) return null;
  // Priority 1: Monday + To BiSS + 07:30
  var best = runs.find(function(sr) { return sr.day === 'Monday' && sr.direction === 'To BiSS' && (sr.time || '').indexOf('07:30') >= 0; });
  if (best && best.duration) return best;
  // Priority 2: any To BiSS morning (time < 12), pick shortest
  var mornings = runs.filter(function(sr) { return sr.direction === 'To BiSS' && sr.time && parseInt(sr.time) < 12 && parseDuration(sr.duration) !== null; });
  if (mornings.length) { mornings.sort(function(a, b) { return parseDuration(a.duration) - parseDuration(b.duration); }); return mornings[0]; }
  // Priority 3: any To BiSS, pick shortest
  var toBiss = runs.filter(function(sr) { return sr.direction === 'To BiSS' && parseDuration(sr.duration) !== null; });
  if (toBiss.length) { toBiss.sort(function(a, b) { return parseDuration(a.duration) - parseDuration(b.duration); }); return toBiss[0]; }
  // Priority 4: any entry with parseable duration, pick shortest
  var any = runs.filter(function(sr) { return parseDuration(sr.duration) !== null; });
  if (any.length) { any.sort(function(a, b) { return parseDuration(a.duration) - parseDuration(b.duration); }); return any[0]; }
  return null;
}

function bestSRBadgeHtml(p, size) {
  var sr = getBestSR(p);
  if (!sr) {
    if (!p.schoolRuns || !p.schoolRuns.length) return '<span class="sr-commute sr-commute-none' + (size === 'lg' ? ' sr-commute-lg' : '') + '">🚗 No school run</span>';
    return '';
  }
  var cls = durColorClass(sr.duration);
  if (!cls) cls = 'grey';
  return '<span class="sr-commute sr-commute-' + cls + (size === 'lg' ? ' sr-commute-lg' : '') + '">🚗 BiSS ' + esc(sr.duration) + '</span>';
}

/* School Run Compare grid */
function renderSRCompare() {
  // Populate property filter
  var propSel = document.getElementById('srfProp');
  var curProp = propSel.value;
  propSel.innerHTML = '<option value="">All Properties</option>' + props.filter(function(p) { return p.schoolRuns && p.schoolRuns.length; }).map(function(p) { return '<option value="' + p.id + '">' + esc(p.address || '—') + '</option>'; }).join('');
  propSel.value = curProp;

  // Gather all rows with scoring
  var rows = [];
  props.forEach(function(p) {
    if (!p.schoolRuns || !p.schoolRuns.length) return;
    p.schoolRuns.forEach(function(sr) {
      var mins = parseDuration(sr.duration);
      var priority = calcSRPriority(sr);
      var rating = mins !== null ? rateMinutes(mins) : null;
      rows.push({
        propId: p.id,
        address: p.address || '—',
        area: p.municipality || '—',
        direction: sr.direction || '',
        day: sr.day || '',
        time: sr.time || '',
        duration: sr.duration || '',
        parsedMins: mins,
        priority: priority,
        rating: rating,
        notes: sr.notes || '',
        mapsUrl: sr.mapsUrl || genMapsUrl(p.address, sr.direction)
      });
    });
  });

  // Apply filters
  var fDir = document.getElementById('srfDir').value;
  var fDay = document.getElementById('srfDay').value;
  var fProp = document.getElementById('srfProp').value;
  var fTime = document.getElementById('srfTime').value;
  var fRating = document.getElementById('srfRating').value;
  if (fDir) rows = rows.filter(function(r) { return r.direction === fDir; });
  if (fDay) rows = rows.filter(function(r) { return r.day === fDay; });
  if (fProp) rows = rows.filter(function(r) { return r.propId === fProp; });
  if (fTime === 'morning') rows = rows.filter(function(r) { return r.time && parseInt(r.time) < 12; });
  if (fTime === 'afternoon') rows = rows.filter(function(r) { return r.time && parseInt(r.time) >= 12; });
  if (fRating === 'poor') rows = rows.filter(function(r) { return r.rating === 'Poor' || (r.parsedMins !== null && r.parsedMins > 20); });
  if (fRating === 'acceptable') rows = rows.filter(function(r) { return r.rating && r.rating !== 'Poor'; });
  if (fRating === 'good') rows = rows.filter(function(r) { return r.rating === 'Good' || r.rating === 'Excellent'; });
  if (fRating === 'excellent') rows = rows.filter(function(r) { return r.rating === 'Excellent'; });

  // Sort
  var dayOrder = {Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4,Weekend:5};
  var rateOrder = {Excellent:0,Good:1,Acceptable:2,Poor:3};
  var priOrder = {High:0,Medium:1,Low:2};
  rows.sort(function(a, b) {
    var va, vb;
    if (srSortCol === 'day') { va = dayOrder[a.day] !== undefined ? dayOrder[a.day] : 9; vb = dayOrder[b.day] !== undefined ? dayOrder[b.day] : 9; }
    else if (srSortCol === 'parsedMins') { va = a.parsedMins !== null ? a.parsedMins : 9999; vb = b.parsedMins !== null ? b.parsedMins : 9999; }
    else if (srSortCol === 'rating') { va = rateOrder[a.rating] !== undefined ? rateOrder[a.rating] : 9; vb = rateOrder[b.rating] !== undefined ? rateOrder[b.rating] : 9; }
    else if (srSortCol === 'priority') { va = priOrder[a.priority] !== undefined ? priOrder[a.priority] : 9; vb = priOrder[b.priority] !== undefined ? priOrder[b.priority] : 9; }
    else { va = (a[srSortCol] || '').toLowerCase(); vb = (b[srSortCol] || '').toLowerCase(); }
    if (va < vb) return srSortDir === 'asc' ? -1 : 1;
    if (va > vb) return srSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  var tbl = document.getElementById('srCompareTable');
  var nd = document.getElementById('srNoData');
  if (!rows.length) { tbl.innerHTML = ''; nd.style.display = 'block'; return; }
  nd.style.display = 'none';

  var cols = [
    {k:'address',l:'Property'},{k:'area',l:'Area'},{k:'direction',l:'Dir'},
    {k:'day',l:'Day'},{k:'time',l:'Time'},{k:'duration',l:'Duration'},
    {k:'parsedMins',l:'Min'},{k:'priority',l:'Priority'},{k:'rating',l:'Rating'},
    {k:'notes',l:'Notes'},{k:'_maps',l:'Maps'}
  ];

  var head = '<thead><tr>' + cols.map(function(c) {
    if (c.k === '_maps') return '<th>Maps</th>';
    var sorted = srSortCol === c.k;
    var arrow = '<span class="sa">' + (sorted ? (srSortDir === 'asc' ? '▲' : '▼') : '▲') + '</span>';
    return '<th class="' + (sorted ? 'sorted' : '') + '" onclick="srSort(\'' + c.k + '\')">' + c.l + arrow + '</th>';
  }).join('') + '</tr></thead>';

  var body = '<tbody>' + rows.map(function(r) {
    var dirBadge = r.direction === 'To BiSS' ? 'sr-badge-to' : 'sr-badge-from';
    var priBadge = 'sr-pri sr-pri-' + r.priority.toLowerCase();
    var rateBadge = r.rating ? 'sr-rate sr-rate-' + r.rating.toLowerCase() : '';
    var minsDisplay = r.parsedMins !== null ? Math.round(r.parsedMins) : '—';
    var minsColor = r.parsedMins !== null ? (r.parsedMins > 30 ? 'color:var(--red);font-weight:700' : r.parsedMins > 20 ? 'color:var(--orange);font-weight:600' : 'color:var(--accent);font-weight:600') : '';
    return '<tr>' +
      '<td style="font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(r.address) + '</td>' +
      '<td>' + esc(r.area) + '</td>' +
      '<td><span class="' + dirBadge + '">' + esc(r.direction) + '</span></td>' +
      '<td>' + esc(r.day) + '</td>' +
      '<td style="font-weight:600">' + esc(r.time) + '</td>' +
      '<td style="color:var(--accent);font-weight:600">' + durBadgeHtml(r.duration) + '</td>' +
      '<td style="' + minsColor + '">' + minsDisplay + '</td>' +
      '<td><span class="' + priBadge + '">' + esc(r.priority) + '</span></td>' +
      '<td>' + (rateBadge ? '<span class="' + rateBadge + '">' + esc(r.rating) + '</span>' : '—') + '</td>' +
      '<td style="color:var(--text2);font-size:.7rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(r.notes) + '</td>' +
      '<td><a class="sr-maps" href="' + esc(r.mapsUrl) + '" target="_blank" rel="noopener">🗺</a></td>' +
    '</tr>';
  }).join('') + '</tbody>';

  tbl.innerHTML = head + body;
}

function srSort(k) {
  if (srSortCol === k) srSortDir = srSortDir === 'asc' ? 'desc' : 'asc';
  else { srSortCol = k; srSortDir = 'asc'; }
  renderSRCompare();
}

function clearSRFilters() {
  document.getElementById('srfDir').value = '';
  document.getElementById('srfDay').value = '';
  document.getElementById('srfProp').value = '';
  document.getElementById('srfTime').value = '';
  document.getElementById('srfRating').value = '';
  renderSRCompare();
}
